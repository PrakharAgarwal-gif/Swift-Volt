version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=swift-volt-super-secret-key
    volumes:
      - ./backend/prisma:/app/prisma

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    depends_on:
      - backend
