services:
  - type: web
    name: swiftvolt-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swiftvolt-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: swiftvolt-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://swiftvolt-backend.onrender.com/api

databases:
  - name: swiftvolt-db
    databaseName: swiftvolt
    user: swiftvolt_user
